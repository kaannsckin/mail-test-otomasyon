# ============================================================
# CI Pipeline — Mail Otomasyon Test Sistemi
# ============================================================
# Her PR ve master push'ta çalışır:
#   1. Lint (flake8) — kod kalitesi
#   2. Import & Syntax check — tüm modüller import edilebilir mi
#   3. Unit tests (pytest) — iş mantığı testleri
#   4. Security check — credential/secret sızıntı taraması
# ============================================================

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── 1. Lint ────────────────────────────────────────────────
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Run flake8 (warnings)
        run: |
          flake8 . \
            --count \
            --exit-zero \
            --max-complexity=15 \
            --max-line-length=120 \
            --statistics \
            --ignore=E501,W503,E302,E303,W291,W292,E266,E265,W293,E711,E712,E741

  # ── 2. Import & Syntax Check ───────────────────────────────
  import-check:
    name: "Import & Syntax"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check all Python files compile
        run: |
          python -m py_compile app.py
          python -m py_compile main.py
          python -m py_compile sender.py
          python -m py_compile receiver.py
          python -m py_compile analyzer.py
          python -m py_compile llm_provider.py
          python -m py_compile auth_manager.py
          python -m py_compile csv_parser.py
          python -m py_compile reporter.py
          python -m py_compile message_templates.py
          echo "✅ All modules compile successfully"

  # ── 3. Unit Tests ──────────────────────────────────────────
  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --co -q 2>/dev/null || true
          pytest tests/ -v --tb=short

  # ── 4. Security Check ─────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Scanning for potential secrets..."

          # API key patterns — placeholder/örnek metinleri ve CI dosyasını hariç tut
          MATCHES=$(grep -rn --include="*.py" --include="*.html" --include="*.yml" \
            -E '(sk-ant-|AIza|ghp_|gho_|AKIA)' . --exclude-dir=.git \
            | grep -v 'placeholder=' \
            | grep -v 'ci\.yml' \
            | grep -v '# ' \
            | grep -v 'example' \
            || true)

          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo "❌ Potential API key found in source!"
            exit 1
          fi

          # Password patterns (excluding examples/templates/placeholders)
          PASS_MATCHES=$(grep -rn --include="*.py" \
            -E 'password\s*=\s*"[^"]{4,}"' . --exclude-dir=.git \
            | grep -v 'example' | grep -v 'config\[' | grep -v '""' \
            | grep -v 'test' | grep -v 'placeholder' \
            || true)

          if [ -n "$PASS_MATCHES" ]; then
            echo "$PASS_MATCHES"
            echo "⚠️  Potential hardcoded password found!"
            exit 1
          fi

          # Check config.yaml is not committed
          if [ -f "config.yaml" ]; then
            echo "❌ config.yaml should not be committed! Add it to .gitignore"
            exit 1
          fi

          echo "✅ No secrets detected"

      - name: Check .gitignore coverage
        run: |
          echo "🔍 Verifying .gitignore..."
          for pattern in "config.yaml" "*.pyc" "__pycache__" "logs/" "reports/"; do
            if grep -q "$pattern" .gitignore; then
              echo "  ✅ $pattern is gitignored"
            else
              echo "  ⚠️  $pattern might be missing from .gitignore"
            fi
          done
