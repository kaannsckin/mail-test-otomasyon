  inline_image:
  - subject_tag: Gömülü Görsel (CID) Doğrulaması
    body: '<html><body><p>Merhaba,</p><p>Bu mesaj, HTML e-postalarda ''Content-ID''
      (CID) referanslı gömülü görsellerin iletimini test etmek içindir.</p><p><img
      src="cid:{{CID}}" alt="Gömülü Görsel" style="max-width:600px" /></p><p>Türkçe:
      ğüşıöçĞÜŞİÖÇ</p>{{SIGNATURE_HTML}}</body></html>'
    length: short
    attachments: []
  - subject_tag: HTML CID Uyumluluk Sınaması
    body: '<html><body><h3>Gömülü Görsel Testi</h3><p>E-posta istemcinizin inline
      (mesaj gövdesinde) görselleri işleme kapasitesi aşağıdaki görsel üzerinden test
      edilmektedir.</p><ul><li>Görsel multipart/related yapısı içinde kapsüllenmiştir.</li><li>Farklı
      ağ koşullarında görsel bütünlüğü korunmalıdır.</li></ul><p>Yukarıdaki görsel
      görünmüyorsa, CID referansı alıcı tarafında çözümlenememiş demektir. Bu durumda
      istemci loglarını ve MIME yapısını kontrol ediniz.</p><h3>Gömülü Görsel</h3><p><img
      src="cid:{{CID}}" alt="Safir Test" style="max-width:600px; border:1px solid
      #ccc" /></p>{{SIGNATURE_HTML}}</body></html>'
    length: medium
    attachments: []
  - subject_tag: Gelişmiş CID ve HTML5 Render Analizi
    body: '<html><body><h2>Teknik Detay: CID (Content-ID) Mimarisi</h2><p>Bu senaryo,
      görsellerin base64 olarak gövdeye gömülmesi yerine, ayrı bir MIME parçasında
      tutulup HTML içinde <code>cid:</code> protocolu ile çağırılmasını (referencing)
      test eder.</p>== Beklenen Davranış ==<br/>1. İstemci mesajı açtığında görseli
      otomatik yüklemelidir (external image gibi blocklamadan).<br/>2. ''Forward''
      veya ''Reply'' yapıldığında CID eşleşmesi bozulmamalıdır.<br/>3. Outlook''un
      ''Word'' motorunda ve mobil istemcilerde ''auto-scale'' özelliği düzgün çalışmalıdır.<br/><br/><h3>Test
      Görseli</h3><p><img src="cid:{{CID}}" alt="Kurumsal Logo" style="max-width:100%;
      height:auto" /></p>{{SIGNATURE_HTML}}</body></html>'
    length: long
    attachments: []
