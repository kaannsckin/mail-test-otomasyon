  - attachments: []
    body: "Teknik Ekibe,\n\nBu mesaj, e-posta istemcilerinin ekli dosyaları (attachment)\
      \ RFC 2183 standartlarına göre nasıl kapsüllediğini ölçümlemek için tasarlanmıştır.\n\
      \n== Senaryo ve Beklenti ==\nE-posta içeriğinde yer alan ekler; sunucu tarafından\
      \ 'multipart/mixed' yapısı altında gönderilmektedir. Testin temel amacı, bu\
      \ karışık MIME segmentlerinin alıcı tarafında (Outlook, Gmail, iOS vb.) birbirinden\
      \ hatasız ayrıştırılıp ayrıştırılmadığını görmektir. \n\n== Doğrulama Listesi\
      \ ==\n- Dosya Adı: {filename} (Türkçe karakter testi dahil)\n- MIME Type: Alıcı\
      \ tarafından otomatik tanınmalıdır.\n- İletim Güvenliği: Dosyanın binary bütünlüğü\
      \ korunmalıdır.\n\nÖzellikle mobil istemcilerde (EAS/Z-Push) eklenti adlarındaki\
      \ bozulmalar (encoding errors) bu testin ana odak noktasıdır.\n\n---\nSaygılarımla,\n\
      Mail Otomasyon Test Sistemi\nBilgi Teknolojileri Müdürlüğü\nTel: +90 312 000\
      \ 00 00 | Dahili: 4455\nBu mesaj otomatik test altyapısı tarafından üretilmiştir.\n"
    length: long
    subject_tag: 'Teknik Rapor: Eklenti ve MIME Yapısı Analizi'
