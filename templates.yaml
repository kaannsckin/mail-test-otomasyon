      Bu mesaj, alıcı istemcinin temel SMTP düz metin (Plain Text) e-postaları UTF-8
      standartlarında alıp almadığını doğrulamak amacıyla gönderilmiştir.

      Test Amacı: Karakter seti bütünlüğü ve iletim hızı.

      Türkçe karakterler: ğüşıöçĞÜŞİÖÇ



      ---

      Saygılarımla,

      Mail Otomasyon Test Sistemi

      Bilgi Teknolojileri Müdürlüğü

      Tel: +90 312 000 00 00 | Dahili: 4455

      Bu mesaj otomatik test altyapısı tarafından üretilmiştir.

      '
    length: short
    attachments: []
  - subject_tag: Protokol Doğrulama - UTF-8 / Plain Text
    body: 'Sayın Yetkili,


      E-posta altyapı geçiş çalışmaları kapsamında, alıcı istemcinin standard RFC
      5322 uyumluluğu test edilmektedir.


      Senaryo Detayı:

      - Mesaj Tipi: Plain Text (Düz Metin)

      - Kodlama: UTF-8 (7-bit / 8-bit)

      - Kontrol: ĞÜŞİÖÇ karakterlerinin bozulmadan iletimi.


      Bu mesajın içeriği, sunucu tarafındaki MIME transformasyonlarının doğruluğunu
      teyit etmek için tasarlanmıştır.



      ---

      Saygılarımla,

      Mail Otomasyon Test Sistemi

      Bilgi Teknolojileri Müdürlüğü

      Tel: +90 312 000 00 00 | Dahili: 4455

      Bu mesaj otomatik test altyapısı tarafından üretilmiştir.

      '
    length: medium
    attachments: []
  - subject_tag: 'Teknik Analiz: Plain Text Protokol Uyumluluğu'
    body: 'Sayın Teknik Ekip,


      Posta sunucusu (EMS/Safir) geçiş sürecinde, alıcı tarafındaki istemcilerin metin
      tabanlı içerikleri işleme kapasitesi ölçülmektedir.


      == Test ve Analiz Kapsamı ==

      Bu uzun formatlı düz metin mesajı; ağ üzerindeki paket segmentasyonu ve SMTP
      sunucusundaki satır sonu (CRLF) dönüşümlerini test eder. Özellikle 80 karakterden
      uzun satırların istemci tarafından nasıl wrap edildiği (sarılmış) ve Türkçe
      karakterlerin bu süreçte zarar görüp görmediği incelenmektedir.


      == Doğrulama Parametreleri ==

      1. UTF-8 Karakter seti: ğüşıöç ĞÜŞIÖÇ (Tam Set)

      2. Satır uzunluğu toleransı: Mesajın görsel bütünlüğü korunmalıdır.

      3. Header / Body ayırımı devitasyonu: MIME boundary tespiti.


      Bu otomatik üretilmiş bir içeriktir. Lütfen kontrol sonrası teyit ediniz.


      ---

      Saygılarımla,

      Mail Otomasyon Test Sistemi

      Bilgi Teknolojileri Müdürlüğü

      Tel: +90 312 000 00 00 | Dahili: 4455

      Bu mesaj otomatik test altyapısı tarafından üretilmiştir.

      '
    length: long
    attachments: []
