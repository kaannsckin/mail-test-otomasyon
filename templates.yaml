      Bu mesaj otomatik test altyapısı tarafından üretilmiştir.

      '
    length: medium
    subject_tag: Protokol Doğrulama - UTF-8 / Plain Text
  - attachments: []
    body: 'Sayın Teknik Ekip,


      Posta sunucusu (EMS/Safir) geçiş sürecinde, alıcı tarafındaki istemcilerin metin
