  - attachments: []
    body: 'Sayın Yetkili,


      E-posta altyapı geçiş çalışmaları kapsamında, alıcı istemcinin standard RFC
      5322 uyumluluğu test edilmektedir.


      Senaryo Detayı:

      - Mesaj Tipi: Plain Text (Düz Metin)

      - Kodlama: UTF-8 (7-bit / 8-bit)

      - Kontrol: ĞÜŞİÖÇ karakterlerinin bozulmadan iletimi.


      Bu mesajın içeriği, sunucu tarafındaki MIME transformasyonlarının doğruluğunu
      teyit etmek için tasarlanmıştır.



