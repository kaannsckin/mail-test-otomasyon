services:
  - type: web
    name: mail-test-otomasyon
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /data
    disk:
      name: app-data
      mountPath: /data
      sizeGB: 1
